name: biztrack_gh
description: SikaBoafo — mobile client (inventory, sales, expenses, receivables).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.4
  uuid: ^4.5.1
  intl: ^0.19.0
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.3.3
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/products/
  fonts:
    - family: SegoeUI
      fonts:
        - asset: assets/fonts/SegoeUI-Light.ttf
          weight: 300
        - asset: assets/fonts/SegoeUI-Regular.ttf
          weight: 400
        - asset: assets/fonts/SegoeUI-Bold.ttf
          weight: 700
    - family: Constantia
      fonts:
        - asset: assets/fonts/Constantia-Regular.ttf
          weight: 400
        - asset: assets/fonts/Constantia-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/sikaboafo.png
  android: true
  ios: true
  android_12:
    color: "#FFFFFF"
    image: assets/images/sikaboafo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
