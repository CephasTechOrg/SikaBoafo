services:
  - type: web
    name: biztrackgh-api
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PIP_ROOT_USER_ACTION
        value: ignore
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: biztrackgh-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PAYSTACK_SECRET_KEY_TEST
        sync: false
      - key: PAYSTACK_SECRET_KEY_LIVE
        sync: false
      - key: ARKESEL_API_KEY
        sync: false

databases:
  - name: biztrackgh-db
    region: oregon
    plan: free
